name: Auto Fetch BD Channels

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: node index.js --once

      - run: |
          if git diff --quiet HEAD -- bd_channels.m3u8 fetcher.log; then
            echo "No changes detected"
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add bd_channels.m3u8 fetcher.log
          git commit -m "Auto-update BD channels [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
